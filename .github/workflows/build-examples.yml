name: Build Examples

on:
  push:
    branches: ["**"]
  pull_request:
    branches: ["**"]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4
      - name: Make decode
        run: make --directory=src/examples/decode
      - name: Make encode
        run: make --directory=src/examples/encode
      - name: Run encode
        run: src/examples/encode/encode
